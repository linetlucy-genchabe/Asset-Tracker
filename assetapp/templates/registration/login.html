{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – Asset Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{% static 'css/styles.css' %}" rel="stylesheet">
</head>
<body>

<div class="login-wrapper">
  <div class="card login-card p-4">
    <div class="text-center mb-4">
      <div class="login-icon">
        <i class="bi bi-phone-fill"></i>
      </div>
      <h4 class="fw-bold mb-1">Asset Tracker</h4>
      <p class="text-muted small mb-0"></p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger py-2 small">
      <i class="bi bi-exclamation-triangle me-1"></i> Invalid username or password.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-person text-muted"></i>
          </span>
          <input type="text" name="username" class="form-control border-start-0 ps-0"
                 placeholder="Enter your username" autofocus required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" name="password" class="form-control border-start-0 ps-0"
                 placeholder="Enter your password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-success w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <p class="text-center text-muted small mt-4 mb-0">
      Ministry of Health Kenya &mdash; eCHIS Platform
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/assets.js' %}"></script>
</body>
</html>
